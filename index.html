<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Portfolio | Terminal_v1.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>

    <nav>
        <div class="logo">SYSTEM_CORE</div>
        <div class="status-indicator"><span></span> ONLINE</div>
    </nav>

    <main>
        <section class="hero">
            <h1 class="glitch" data-text="INNOVATE">INNOVATE</h1>
            <p class="subtitle">> Developing the future of robotics and web systems.</p>
            <div class="terminal-window">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="title">bash — 80x24</span>
                </div>
                <div class="terminal-body">
                    <p><span class="prompt">$</span> initializing_skills.sh</p>
                    <p class="output">Loading: Software Engineering... [OK]</p>
                    <p class="output">Loading: Robotics & ROS... [OK]</p>
                    <p class="output">Loading: AI & Simulation... [OK]</p>
                    <p><span class="prompt">$</span> <span class="cursor">_</span></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 // NODE_01 // SECURE_CONNECTION</p>
    </footer>
</body>
</html>
